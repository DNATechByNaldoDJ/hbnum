# hbnum: Released to Public Domain.
#
# Default local test profile. Environment variables keep precedence over these
# values, and HBNUM_TEST_PROFILE can select profile.* overrides below.

[run]
suites=unit,robust,bench
seed=20260423

[unit]
groups=add,sub,mul,div,rounding,root_log,domain_policy,compare,format,mod,powint,number_theory,random,tbigntst
mod_fuzz_seed=20260421
mod_fuzz_decimal_seed=20260422
mod_fuzz_int_loops=400
mod_fuzz_decimal_loops=400

[robustness]
int_loops=250
decimal_loops=250
large_loops=80
lifecycle_loops=1000

[benchmark]
filter=
skip_perf=false

[compare.tbig]
enabled=true
powint_loops=20
mul_loops=120
mod_loops=120
gcd_loops=180
sqrt_loops=24
nthroot_loops=16
log_loops=10
log10_loops=12
ln_loops=8

[profile.gate.unit]
groups=add,sub,mul,div,rounding,root_log,domain_policy,compare,format,mod,powint,number_theory,random,tbigntst
mod_fuzz_int_loops=120
mod_fuzz_decimal_loops=120

[profile.gate.robustness]
int_loops=120
decimal_loops=120
large_loops=40
lifecycle_loops=400

[profile.gate.benchmark]
filter=PERF_MOD_512D
skip_perf=false

[profile.gate.compare.tbig]
mod_loops=5
sqrt_loops=1
nthroot_loops=1
log_loops=1
log10_loops=1
ln_loops=1

[profile.smoke.unit]
groups=div,mod,number_theory,random,root_log
mod_fuzz_int_loops=40
mod_fuzz_decimal_loops=40

[profile.smoke.robustness]
int_loops=40
decimal_loops=40
large_loops=10
lifecycle_loops=80

[profile.smoke.benchmark]
filter=ROOTLOG
skip_perf=true

[profile.smoke.compare.tbig]
mod_loops=2
sqrt_loops=1
nthroot_loops=1
log_loops=1
log10_loops=1
ln_loops=1
